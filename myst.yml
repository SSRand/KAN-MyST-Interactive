# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: 'KAN as a Dynamic Paper'
  subtitle: Interactive Kolmogorov–Arnold Networks
  description: >-
    Each section of the paper is paired with an interactive panel that
    performs the step it describes. The panels are independent routes of a
    Dash app, embedded here as iframes.
  keywords:
    - kolmogorov-arnold networks
    - dynamic paper
    - mystmd
    - dashboard
  github: https://github.com/SSRand/KAN-MyST-Interactive
  numbering:
    headings: true
  open_access: true
  license:
    content: CC-BY-4.0
    code: MIT
  abbreviations:
    KAN: Kolmogorov-Arnold Network
    MLP: Multi-Layer Perceptron
  bibliography:
    - paper.bib
  resources:
    - content/kan_demo.ipynb
  # Internal planning / decision notes — not part of the rendered article.
  exclude:
    - docs/**
    - app/**
site:
  template: article-theme
