# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: 'KAN as a Dynamic Paper'
  subtitle: An interactive Evidence-style paper backed by a containerised Dash app
  description: >-
    Kolmogorov-Arnold Network paper rendered with MyST and the Evidence
    article-theme. The interactive panels are independent Dash routes served
    by the sibling `app/` container; the paper embeds each one with an
    `{iframe}` directive next to the relevant prose.
  keywords:
    - kolmogorov-arnold networks
    - dynamic paper
    - reproducible publishing
    - mystmd
    - dashboard
  github: https://github.com/SSRand/KAN-MyST-Interactive
  numbering:
    headings: true
  open_access: true
  license:
    content: CC-BY-4.0
    code: MIT
  abbreviations:
    KAN: Kolmogorov-Arnold Network
    MLP: Multi-Layer Perceptron
  bibliography:
    - paper.bib
  resources:
    - content/kan_demo.ipynb
site:
  template: article-theme
